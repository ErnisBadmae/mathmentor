services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ege
      POSTGRES_PASSWORD: ege
      POSTGRES_DB: ege_mentor
    ports:
      - "5434:5432"
    volumes:
      - ege_mentor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ege -d ege_mentor"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ege:ege@postgres:5432/ege_mentor
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
        VITE_API_TOKEN: ${API_SHARED_TOKEN:-}
    depends_on:
      - api
    ports:
      - "8088:80"

  # Ученический тренажёр в Telegram (дрилл + срез + ИИ-оценка). Long-poll, без портов.
  # Требует в .env: TELEGRAM_BOT_TOKEN, TELEGRAM_STUDENT_CHAT_ID и (если Telegram закрыт
  # напрямую) TELEGRAM_PROXY_URL или HTTPS_PROXY.
  bot:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ege:ege@postgres:5432/ege_mentor
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-${HTTPS_PROXY:-}}
    command: ["python", "-m", "app.adapters.telegram.bot"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  ege_mentor_pg:
