services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ege
      POSTGRES_PASSWORD: ege
      POSTGRES_DB: ege_mentor
    ports:
      - "5434:5432"
    volumes:
      - ege_mentor_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ege -d ege_mentor"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ege_mentor_pg:
